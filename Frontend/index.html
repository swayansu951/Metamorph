<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Metamorph</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="chat-container">
            <div class="app-title">Metamorph</div>
            <div class="toolbar">
                <div class="upload-row">
                    <input id="pdf-file" type="file" accept=".pdf">
                    <button id="upload-btn" type="button">Upload PDF</button>
                </div>
                <input
                    id="doc-id"
                    type="text"
                    placeholder="Document ID (upload a PDF or enter an existing one)"
                >
                <div id="status-text" class="status-text">
                    Upload a PDF or enter a document ID to start chatting.
                </div>
            </div>

            <div id="chat-box" class="chat-content">
                <div class="message bot">
                    Hello! Upload a PDF or enter a document ID, then ask your question.
                </div>
            </div>

            <div class="review-panel">
                <div class="review-header">
                    <div class="review-title">Answer Review</div>
                    <div id="review-status" class="review-status">
                        Submit feedback after a response arrives.
                    </div>
                </div>

                <div class="review-grid">
                    <label class="review-field">
                        <span>Reviewer name</span>
                        <input id="reviewer-name" type="text" placeholder="Enter your name">
                    </label>

                    <div class="review-field">
                        <span>Rating</span>
                        <div id="rating-group" class="rating-group" role="radiogroup" aria-label="Answer rating">
                            <button class="rating-btn" type="button" data-rating="1" aria-pressed="false">1</button>
                            <button class="rating-btn" type="button" data-rating="2" aria-pressed="false">2</button>
                            <button class="rating-btn" type="button" data-rating="3" aria-pressed="false">3</button>
                            <button class="rating-btn" type="button" data-rating="4" aria-pressed="false">4</button>
                            <button class="rating-btn" type="button" data-rating="5" aria-pressed="false">5</button>
                        </div>
                    </div>
                </div>

                <div class="review-field">
                    <span>Quick checks</span>
                    <div class="review-tags">
                        <label class="tag-option">
                            <input type="checkbox" value="accurate answer">
                            <span>Accurate answer</span>
                        </label>
                        <label class="tag-option">
                            <input type="checkbox" value="first response">
                            <span>First response</span>
                        </label>
                        <label class="tag-option">
                            <input type="checkbox" value="followed query correctly">
                            <span>Followed query correctly</span>
                        </label>
                    </div>
                </div>

                <label class="review-field">
                    <span>Notes</span>
                    <textarea id="review-feedback" rows="2" placeholder="Optional feedback"></textarea>
                </label>

                <div class="review-actions">
                    <button id="submit-review-btn" type="button">Save Review</button>
                </div>
            </div>

            <div class="input-area">
                <textarea id="user-input" placeholder="Type a message here.." rows="1"></textarea>
                <button id="send-btn" type="button">Send</button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
